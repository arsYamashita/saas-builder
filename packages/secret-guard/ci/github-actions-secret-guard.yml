## Reusable secret-guard PR gate.
##
## This is a TEMPLATE for other repos to adopt (this repo, saas-builder,
## already has the live copy at .github/workflows/secret-guard.yml — kept
## as a separate file from ci.yml deliberately, so this package never has
## to touch that shared workflow file).
##
## Install in another repo:
##   1. Copy this file to that repo's .github/workflows/secret-guard.yml
##   2. Copy packages/secret-guard/ci/gitleaks.toml to that repo (any path;
##      adjust GITLEAKS_CONFIG below), or `npm install`
##      `@saas/secret-guard` if the repo is already an npm-workspaces
##      sibling of saas-builder and reference it in place.
##   3. Adjust the `GITLEAKS_CONFIG` env below to that path.
##
## gitleaks scans the full PR diff against `main` (fetch-depth: 0 + explicit
## --log-opts range) so it catches secrets introduced anywhere in the PR's
## commits, not just the tip commit — a squash-merge workflow can otherwise
## hide an earlier commit's leaked secret from a tip-only scan.
name: secret-guard

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  GITLEAKS_CONFIG: packages/secret-guard/ci/gitleaks.toml

jobs:
  gitleaks:
    name: gitleaks (secret scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: ${{ env.GITLEAKS_CONFIG }}
          # GITLEAKS_LICENSE is only required for GitHub Organization
          # accounts (free at gitleaks.io) — not needed for a personal
          # account repo like this one. Add it as a repo secret and
          # uncomment below if this template is copied into an org repo:
          # GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
