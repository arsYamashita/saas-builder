name: secret-guard

# gitleaks PR gate for saas-builder. Deliberately a separate workflow file
# from ci.yml (not appended as a job there) so packages/secret-guard never
# has to touch that shared file. See packages/secret-guard/README.md and
# packages/secret-guard/ci/gitleaks.toml for the full design + allowlist
# rationale, and packages/secret-guard/ci/github-actions-secret-guard.yml
# for the copy-paste template this file is instantiated from (for other
# repos to adopt the same gate).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  GITLEAKS_CONFIG: packages/secret-guard/ci/gitleaks.toml

jobs:
  gitleaks:
    name: gitleaks (secret scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: ${{ env.GITLEAKS_CONFIG }}
