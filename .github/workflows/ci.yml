name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit 2>&1 | grep -v "^exports/" | tee /dev/stderr | (! grep "error TS")

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:unit

  security-gate:
    name: Security Regression Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # security-gate-check.ts diffs new supabase/migrations files
          # against the PR base branch (`git diff <base>...HEAD`), which
          # needs real history, not the default single-commit shallow
          # clone.
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Pull requests: GITHUB_BASE_REF is set by GitHub Actions, so
      # security-gate-check.ts diffs against origin/<base-branch>. Push
      # events to main have no base ref — fetch origin/main explicitly so
      # the fallback in security-gate-check.ts always resolves.
      - run: git fetch origin main --quiet
      - run: npm run security:gate

  playwright:
    name: Playwright Smoke Tests
    runs-on: ubuntu-latest
    needs: [typecheck, unit-tests]
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
      TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # webkit is required since playwright.config.ts gained the webkit /
      # logged-in-webkit projects (m5/webkit-e2e) — `npx playwright test`
      # selects them, so a chromium-only install would fail on a fresh
      # runner with "browserType.launch: Executable doesn't exist".
      - run: npx playwright install --with-deps chromium webkit
      - run: npx playwright test
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
